<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borel Tec - Central de Comando v10</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        /* O DESIGN QUE VOCÊ DESENHOU */
        body { font-family: 'Segoe UI', sans-serif; color: #ecf0f1; margin: 0; padding: 150px 15px 20px 15px; background: #0d1117; }
        
        #tela-acesso { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .acesso-card { border-radius: 12px; border: 2px solid #30363d; text-align: center; width: 85%; max-width: 320px; padding: 30px 20px; background: url('./background.gif'); background-position: center; background-size: cover; border-top: 4px solid #39ff14; box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); }
        
        .input-group { position: relative; width: 100%; margin: 10px 0; }
        .input-group input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: #00ff00; text-align: center; border-radius: 6px; box-sizing: border-box; font-weight: bold; font-size: 1rem; }
        .toggle-pass { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #8b949e; }

        .header-tools { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: #161b22; border-bottom: 1px solid #30363d; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        .nav-bar { position: fixed; top: 70px; left: 0; width: 100%; height: 50px; background: #0d1117; border-bottom: 1px solid #30363d; z-index: 999; display: flex; align-items: center; justify-content: space-around; padding: 0 10px; box-sizing: border-box; overflow-x: auto; }
        
        .btn-calc { background: #21262d; border: 2px solid #58a6ff; color: #58a6ff; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        .nav-link { color: #8b949e; text-decoration: none; font-size: 0.75rem; font-weight: bold; cursor: pointer; padding: 5px 8px; border-radius: 5px; white-space: nowrap; }
        .nav-link.admin { color: #39ff14; border: 1px solid #39ff14; display: none; }

        .total-box { background: #238636; color: white; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 1.3rem; margin-bottom: 20px; border: 1px solid #39ff14; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        
        .card { background: rgba(22, 27, 34, 0.9); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d; }
        
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .dia { background: #21262d; padding: 12px 0; text-align: center; border-radius: 4px; font-size: 0.8rem; border: 1px solid #30363d; color: #8b949e; cursor: pointer; transition: 0.3s; }
        .dia:hover { border-color: #58a6ff; color: white; }
        .dia-programado { background: #d97706 !important; color: white !important; border-color: #ff9d00 !important; }
        .dia-concluido { background: #059669 !important; color: white !important; border-color: #39ff14 !important; }
        .hoje { border: 2px solid #58a6ff !important; color: white; box-shadow: 0 0 10px rgba(88, 166, 255, 0.5); }

        .item { background: #1c2128; border-left: 5px solid #58a6ff; padding: 15px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #30363d; position: relative; }
        .item.pausado { border-left-color: #f1e05a; opacity: 0.7; background: #161b22; }
        
        .btn-green { background: linear-gradient(180deg, #2ea44f 0%, #238636 100%); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-mini { padding: 8px 12px; font-size: 0.7rem; border-radius: 6px; border: none; font-weight: bold; color: white; cursor: pointer; margin-right: 5px; margin-top: 8px; text-transform: uppercase; }
        
        #modal-calc { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .calc-body { background: #161b22; border: 2px solid #58a6ff; padding: 20px; border-radius: 15px; width: 280px; box-shadow: 0 0 30px rgba(88, 166, 255, 0.3); }
    </style>
</head>
<body>

    <div id="tela-acesso">
        <div id="box-login" class="acesso-card">
            <h3 style="color: white; text-shadow: 0 0 10px #39ff14;">SISTEMA BOREL TEC</h3>
            <div class="input-group"><input type="text" id="user-login" placeholder="USUÁRIO"></div>
            <div class="input-group"><input type="password" id="pass-login" placeholder="SENHA"></div>
            <button class="btn-green" onclick="fazerLogin()">ENTRAR NA CENTRAL</button>
            <p style="font-size: 0.7rem; color: #8b949e; margin-top: 15px;">Desenvolvido por Jean Borel</p>
        </div>
    </div>

    <div class="header-tools">
        <button class="btn-calc" onclick="abrirCalc()">🧮 CALCULADORA</button>
        <div id="nome-logado" style="font-size: 0.8rem; color: #39ff14; font-weight: bold; text-shadow: 0 0 5px #39ff14;"></div>
    </div>

    <div class="nav-bar">
        <span id="btn-admin" class="nav-link admin" onclick="abrirAdmin()">CENTRAL MASTER</span>
        <span class="nav-link" style="color:#f85149" onclick="confirmarSair()">ENCERRAR SESSÃO</span>
    </div>

    <div class="total-box">PRODUÇÃO HOJE: <span id="somaDia">0</span></div>

    <div class="card">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:10px">
            <button class="btn-mini" onclick="mudarMes(-1)" style="background:#30363d"><</button>
            <span id="mesAno" style="font-weight:bold; color:#58a6ff; text-transform: uppercase;"></span>
            <button class="btn-mini" onclick="mudarMes(1)" style="background:#30363d">></button>
        </div>
        <div class="cal-grid" id="calendario"></div>
    </div>

    <div class="card">
        <label style="font-size: 0.7rem; color: #8b949e;">MODELO DA CARGA:</label>
        <select id="modelo" style="width:100%; padding:12px; margin: 5px 0 15px 0; border-radius:6px; background:#0d1117; color:white; border:1px solid #30363d; font-weight: bold;">
            <option value="MALTA">MALTA</option><option value="RAVEL">RAVEL</option>
            <option value="ARMANI">ARMANI</option><option value="IMOLA">IMOLA</option>
            <option value="SCOTT">SCOTT</option><option value="FLY">FLY</option>
            <option value="MEGA">MEGA</option><option value="BELLA">BELLA</option>
            <option value="BOSS">BOSS</option><option value="FAZANO">FAZANO</option>
            <option value="TIVOLI">TIVOLI</option><option value="PARATY">PARATY</option>
        </select>
        <label style="font-size: 0.7rem; color: #8b949e;">QUANTIDADE TOTAL:</label>
        <input type="number" id="quantidade" placeholder="Ex: 2000" style="width:100%; padding:12px; margin: 5px 0 15px 0; border-radius:6px; background:#0d1117; color:white; border:1px solid #30363d; box-sizing: border-box; font-size: 1.1rem; color: #39ff14;">
        <button class="btn-green" onclick="adicionarCarga()">🚀 INICIAR PRODUÇÃO AGORA</button>
    </div>

    <div id="listaProducao"></div>

    <div class="card">
        <h3 style="font-size: 0.9rem; color: #58a6ff;">HISTÓRICO CONCLUÍDO (SESSÃO)</h3>
        <div id="listaHistorico" style="max-height: 200px; overflow-y: auto; background: #0d1117; padding: 10px; border-radius: 6px; font-size: 0.8rem;"></div>
        <button class="btn-green" style="margin-top:15px; background: #1f6feb;" onclick="finalizarRelatorio()">✅ GERAR RELATÓRIO WHATSAPP</button>
    </div>

    <div id="modal-calc">
        <div class="calc-body">
            <input type="text" class="calc-display" id="display" readonly value="0">
            <div class="calc-grid">
                <button class="btn-c" onclick="limparCalc()" style="grid-column: span 2; background:#da3633">C</button>
                <button class="btn-c" onclick="apagarUltimo()">⌫</button>
                <button class="btn-c" onclick="addChar('/')">/</button>
                <button class="btn-c" onclick="addChar('7')">7</button><button class="btn-c" onclick="addChar('8')">8</button><button class="btn-c" onclick="addChar('9')">9</button><button class="btn-c" onclick="addChar('*')">x</button>
                <button class="btn-c" onclick="addChar('4')">4</button><button class="btn-c" onclick="addChar('5')">5</button><button class="btn-c" onclick="addChar('6')">6</button><button class="btn-c" onclick="addChar('-')">-</button>
                <button class="btn-c" onclick="addChar('1')">1</button><button class="btn-c" onclick="addChar('2')">2</button><button class="btn-c" onclick="addChar('3')">3</button><button class="btn-c" onclick="addChar('+')">+</button>
                <button class="btn-c" onclick="addChar('0')" style="grid-column: span 2">0</button><button class="btn-c" onclick="addChar('.')">.</button>
                <button class="btn-c" style="background:#238636" onclick="calcularResultado()">=</button>
            </div>
            <button class="btn-green" style="margin-top:15px; background:#30363d" onclick="fecharCalc()">VOLTAR AO SISTEMA</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyC3Y8zlsgPyoG4G_J-XgxvGHR2tgJ8k70Q",
            authDomain: "boreltec.firebaseapp.com",
            databaseURL: "https://boreltec-default-rtdb.firebaseio.com",
            projectId: "boreltec",
            storageBucket: "boreltec.firebasestorage.app",
            messagingSenderId: "974276169569",
            appId: "1:974276169569:web:9eeaa88336a459ad6cbf20"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let logado = null;
        let historicoSessao = [], cargasAtivas = [], memoriaCal = {}, agendaMetas = {};
        let dataAtual = new Date();

        // MOTOR DE DADOS
        function sincronizar() {
            if(!logado) return;
            const u = logado.user;
            db.ref(`dados/${u}`).on('value', s => {
                const d = s.val() || {};
                cargasAtivas = d.ativas || [];
                memoriaCal = d.producao || {};
                agendaMetas = d.metas || {};
                historicoSessao = d.sessao || [];
                render();
            });
            if(logado.user === 'BorelAdmin') document.getElementById('btn-admin').style.display = 'block';
        }

        function salvar() {
            if(!logado) return;
            db.ref(`dados/${logado.user}`).update({
                ativas: cargasAtivas,
                producao: memoriaCal,
                metas: agendaMetas,
                sessao: historicoSessao
            });
        }

        // LÓGICA DE PRODUÇÃO IGUAL AO SEU DESENHO
        function adicionarCarga() {
            const mod = document.getElementById('modelo').value;
            const q = parseInt(document.getElementById('quantidade').value);
            if(!q) return;
            cargasAtivas.push({ id: Date.now(), mod, qtd: q, ini: agora(), pausado: false });
            document.getElementById('quantidade').value = "";
            salvar();
        }

        function editarCarga(id) {
            const c = cargasAtivas.find(x => x.id === id);
            const r = parseInt(prompt(`RESTANTE PARA ${c.mod}:`, c.qtd));
            if(!isNaN(r) && r >= 0) {
                if(r < c.qtd) {
                    historicoSessao.push({ mod: c.mod, qtd: c.qtd - r, ini: c.ini, fim: agora() });
                }
                c.qtd = r; 
                if(r === 0) cargasAtivas = cargasAtivas.filter(x => x.id !== id);
                salvar();
            }
        }

        function concluir(id) {
            const c = cargasAtivas.find(x => x.id === id);
            const k = `${dataAtual.getFullYear()}-${dataAtual.getMonth()}-${dataAtual.getDate()}`;
            historicoSessao.push({ mod: c.mod, qtd: c.qtd, ini: c.ini, fim: agora() });
            memoriaCal[k] = (memoriaCal[k] || 0) + c.qtd;
            cargasAtivas = cargasAtivas.filter(x => x.id !== id);
            salvar();
        }

        function alternarPausa(id) {
            const c = cargasAtivas.find(x => x.id === id);
            c.pausado = !c.pausado;
            salvar();
        }

        function finalizarRelatorio() {
            let det = "";
            historicoSessao.forEach(i => { det += `🔹 ${i.mod}: ${i.qtd}un (${i.ini}-${i.fim})\n`; });
            const msg = `*RELATÓRIO BOREL TEC*\n👤 *OP:* ${logado.nome}\n${det}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
        }

        function render() {
            const lista = document.getElementById('listaProducao'); lista.innerHTML = "";
            cargasAtivas.forEach(c => {
                lista.innerHTML += `
                <div class="item ${c.pausado ? 'pausado' : ''}">
                    <strong style="color:#58a6ff">${c.mod}</strong> <span style="float:right; color:#39ff14">${c.qtd} un.</span><br>
                    <small>INÍCIO: ${c.ini}</small><br>
                    <button class="btn-mini" style="background:#238636" onclick="concluir(${c.id})">CONCLUIR</button>
                    <button class="btn-mini" style="background:#f1e05a; color:black" onclick="alternarPausa(${c.id})">PAUSAR</button>
                    <button class="btn-mini" style="background:#58a6ff" onclick="editarCarga(${c.id})">EDITAR</button>
                </div>`;
            });
            const h = document.getElementById('listaHistorico'); h.innerHTML = "";
            historicoSessao.slice().reverse().forEach(i => {
                h.innerHTML += `<div style="border-bottom:1px solid #30363d; padding:5px">✅ ${i.mod} | ${i.qtd}un | ${i.ini}-${i.fim}</div>`;
            });
            const k = `${dataAtual.getFullYear()}-${dataAtual.getMonth()}-${dataAtual.getDate()}`;
            document.getElementById('somaDia').innerText = memoriaCal[k] || 0;
            renderCal();
        }

        function renderCal() {
            const cal = document.getElementById('calendario'); cal.innerHTML = "";
            document.getElementById('mesAno').innerText = `${dataAtual.getMonth()+1} / ${dataAtual.getFullYear()}`;
            const diasNoMes = new Date(dataAtual.getFullYear(), dataAtual.getMonth() + 1, 0).getDate();
            for(let i=1; i<=diasNoMes; i++) {
                const k = `${dataAtual.getFullYear()}-${dataAtual.getMonth()}-${i}`;
                const m = agendaMetas[k] || 0, p = memoriaCal[k] || 0;
                let cl = m > 0 ? (p >= m ? 'dia-concluido' : 'dia-programado') : '';
                const div = document.createElement('div');
                div.className = `dia ${cl} ${i===new Date().getDate()?'hoje':''}`;
                div.innerText = i;
                div.onclick = () => {
                    const novaMeta = prompt(`META DIA ${i}:`, agendaMetas[k] || 0);
                    if(novaMeta !== null) { agendaMetas[k] = parseInt(novaMeta); salvar(); }
                };
                cal.appendChild(div);
            }
        }

        function fazerLogin() {
            const u = document.getElementById('user-login').value, p = document.getElementById('pass-login').value;
            db.ref('usuarios').once('value', s => {
                const users = s.val() || [];
                const conta = users.find(x => x.user === u && x.pass === p);
                if(conta) { logado = conta; localStorage.setItem('bt_v10', JSON.stringify(logado)); location.reload(); }
                else alert("USUÁRIO OU SENHA INVÁLIDOS");
            });
        }

        function agora() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
        function abrirCalc() { document.getElementById('modal-calc').style.display = 'flex'; }
        function fecharCalc() { document.getElementById('modal-calc').style.display = 'none'; }
        function mudarMes(v) { dataAtual.setMonth(dataAtual.getMonth() + v); render(); }
        function confirmarSair() { localStorage.removeItem('bt_v10'); location.reload(); }

        // CALC
        function limparCalc() { document.getElementById('display').value = '0'; }
        function addChar(c) { const d = document.getElementById('display'); d.value = d.value === '0' ? c : d.value + c; }
        function apagarUltimo() { const d = document.getElementById('display'); d.value = d.value.slice(0,-1) || '0'; }
        function calcularResultado() { try { document.getElementById('display').value = eval(document.getElementById('display').value); } catch { limparCalc(); } }

        window.onload = () => {
            logado = JSON.parse(localStorage.getItem('bt_v10'));
            if(logado) {
                document.getElementById('tela-acesso').style.display = 'none';
                document.getElementById('nome-logado').innerText = logado.nome.toUpperCase();
                sincronizar();
            }
        };
    </script>
</body>
</html>
