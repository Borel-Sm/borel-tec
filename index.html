<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borel Tec - Produção Total</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; color: #ecf0f1; margin: 0; padding: 110px 15px 20px 15px; background: #0d1117; }
        
        /* LOGIN 12H */
        #tela-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { border-radius: 12px; border: 2px solid #30363d; text-align: center; width: 85%; max-width: 320px; padding: 40px 20px; background: #161b22; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: #00ff00; text-align: center; border-radius: 6px; box-sizing: border-box; }

        /* HEADER & NAV */
        .minha-logo { position: fixed; top: 15px; left: 15px; height: 50px; z-index: 1001; }
        .top-btns { position: fixed; top: 15px; right: 15px; display: flex; gap: 8px; z-index: 1000; }
        .btn-top { background: #21262d; color: #58a6ff; border: 1px solid #30363d; padding: 10px 15px; border-radius: 6px; font-weight: bold; }

        /* PAINEL */
        .total-box { background: #238636; color: white; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .card { background: rgba(22, 27, 34, 0.9); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d; }
        
        /* ITENS DE PRODUÇÃO */
        .item { background: rgba(48, 54, 61, 0.5); border-left: 4px solid #58a6ff; padding: 15px; margin-bottom: 12px; border-radius: 4px; transition: 0.3s; }
        .item.pausado { border-left-color: #f1e05a; opacity: 0.5; }
        
        .btn-green { background: #238636; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 5px; }
        .btn-red { background: #da3633; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-mini { width: auto; padding: 8px 12px; font-size: 0.8rem; margin-top: 8px; margin-right: 5px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; }

        /* INPUTS */
        select, input[type="number"] { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        
        #listaHistorico { max-height: 250px; overflow-y: auto; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-card">
            <h3 style="color: white; margin-top: 0;">BOREL TEC</h3>
            <input type="text" id="user" placeholder="USUÁRIO">
            <input type="password" id="pass" placeholder="SENHA">
            <button class="btn-green" onclick="autenticar()">ENTRAR</button>
            <p id="erro" style="color:#f85149; display:none; font-size: 0.8rem;">Dados incorretos</p>
        </div>
    </div>

    <img src="logo.png" class="minha-logo">
    <div class="top-btns">
        <button class="btn-top" onclick="document.getElementById('camera-input').click()">📷 SCAN</button>
    </div>
    <input type="file" id="camera-input" accept="image/*" capture="camera" style="display:none" onchange="processarImagem(event)">

    <div class="total-box">PRODUÇÃO HOJE: <span id="somaDia">0</span></div>

    <div class="card" style="margin-top: 15px;">
        <label>Meta do Dia:</label>
        <input type="number" id="metaValor" placeholder="Ex: 2300" onchange="salvar()">
    </div>

    <div class="card">
        <h3>Lançar Carga</h3>
        <select id="modelo">
            <option value="MALTA">MALTA</option><option value="RAVEL">RAVEL</option>
            <option value="ARMANI">ARMANI</option><option value="IMOLA">IMOLA</option>
            <option value="SCOTT">SCOTT</option><option value="FLY">FLY</option>
            <option value="MEGA">MEGA</option><option value="BELLA">BELLA</option>
            <option value="BOSS">BOSS</option><option value="FAZANO">FAZANO</option>
            <option value="TIVOLI">TIVOLI</option><option value="PARATY">PARATY</option>
        </select>
        <input type="number" id="quantidade" placeholder="Quantidade">
        <button class="btn-green" style="background:#1f6feb" onclick="adicionarManual()">INICIAR CARGA</button>
    </div>

    <div id="listaProducao"></div>

    <div class="card">
        <h3>Histórico Concluído</h3>
        <div id="listaHistorico"></div>
        <button class="btn-green" onclick="enviarZap()">📤 ENVIAR RELATÓRIO WHATSAPP</button>
        <button class="btn-red" style="background:#484f58" onclick="limparTudo()">ZERAR TUDO</button>
    </div>

    <script>
        // TABELA DE CONVERSÃO COMPLETA
        const de_para = {
            "PARIS":"MALTA", "BELGA":"MALTA", "VIGOR":"MALTA", "LUNA":"MALTA", "MALTA":"MALTA",
            "NOVITA":"RAVEL", "RAVEL":"RAVEL",
            "AREZO":"ARMANI", "MALIBU":"ARMANI", "ARMANI":"ARMANI",
            "SCOT":"SCOTT", "SCOTT":"SCOTT",
            "DJON":"IMOLA", "IMOLA":"IMOLA",
            "FLY":"FLY", "MEGA":"MEGA", "BELLA":"BELLA", "BOSS":"BOSS", "FAZANO":"FAZANO", "TIVOLI":"TIVOLI", "PARATY":"PARATY"
        };

        function autenticar() {
            if(document.getElementById('user').value === "BorelTec" && document.getElementById('pass').value === "Borel77") {
                localStorage.setItem('borel_sessao', new Date().getTime());
                document.getElementById('tela-login').style.display = 'none';
            } else { document.getElementById('erro').style.display='block'; }
        }

        let historicoGeral = JSON.parse(localStorage.getItem('borel_h_v8')) || [];

        function salvar() {
            localStorage.setItem('borel_h_v8', JSON.stringify(historicoGeral));
            localStorage.setItem('borel_s_v8', document.getElementById('somaDia').innerText);
            localStorage.setItem('borel_m_v8', document.getElementById('metaValor').value);
            localStorage.setItem('borel_p_v8', document.getElementById('listaProducao').innerHTML);
        }

        function adicionarManual() {
            const m = document.getElementById('modelo').value;
            const q = document.getElementById('quantidade').value;
            if(!q || q <= 0) return;
            gerarCard(m, q, new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
            document.getElementById('quantidade').value = "";
            salvar();
        }

        function gerarCard(mod, qtd, ini, pausado = false) {
            const modFinal = de_para[mod] || mod;
            const div = document.createElement('div');
            div.className = `item ${pausado ? 'pausado' : ''}`;
            div.innerHTML = `
                <strong>${modFinal}</strong>: <span class="qtd-txt" onclick="editarQtd(this)">${qtd}</span> un.<br>
                <small>Início: ${ini}</small><br>
                <button class="btn-green btn-mini" onclick="concluir(this, '${modFinal}')">CONCLUIR</button>
                <button class="btn-mini" style="background:#f1e05a; color:black" onclick="pausar(this)">PAUSAR</button>
                <button class="btn-mini" style="background:#da3633; color:white" onclick="excluir(this)">EXCLUIR</button>
            `;
            document.getElementById('listaProducao').appendChild(div);
        }

        function editarQtd(span) {
            const n = prompt("Nova quantidade:", span.innerText);
            if(n && !isNaN(n)) { span.innerText = n; salvar(); }
        }

        function pausar(btn) {
            const item = btn.closest('.item');
            item.classList.toggle('pausado');
            btn.innerText = item.classList.contains('pausado') ? 'RETOMAR' : 'PAUSAR';
            salvar();
        }

        function excluir(btn) {
            if(confirm("Excluir este item?")) { btn.closest('.item').remove(); salvar(); }
        }

        function concluir(btn, mod) {
            const item = btn.closest('.item');
            const qtd = parseInt(item.querySelector('.qtd-txt').innerText);
            const fim = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('somaDia').innerText = parseInt(document.getElementById('somaDia').innerText) + qtd;
            historicoGeral.push({ mod, qtd, fim });
            item.remove(); renderHistorico(); salvar();
        }

        function renderHistorico() {
            const lista = document.getElementById('listaHistorico'); lista.innerHTML = "";
            historicoGeral.slice().reverse().forEach(i => {
                lista.innerHTML += `<div style="border-bottom:1px solid #30363d; padding:5px">✅ ${i.mod}: ${i.qtd}un às ${i.fim}</div>`;
            });
        }

        async function processarImagem(e) {
            const file = e.target.files[0];
            Tesseract.recognize(file, 'por').then(({ data: { text } }) => {
                text.toUpperCase().split('\n').forEach(linha => {
                    const match = linha.match(/(\d+)\s+([A-Z]+)/);
                    if(match) {
                        gerarCard(match[2], match[1], new Date().toLocaleTimeString([],{hour:'2-digit', minute:'2-digit'}));
                    }
                });
                salvar();
            });
        }

        function enviarZap() {
            const total = document.getElementById('somaDia').innerText;
            const meta = document.getElementById('metaValor').value || 0;
            let msg = `*RELATÓRIO BOREL TEC*\n📅 ${new Date().toLocaleDateString()}\n--------------------\n`;
            historicoGeral.forEach(i => msg += `• ${i.mod}: ${i.qtd}un (${i.fim})\n`);
            msg += `--------------------\n*TOTAL:* ${total}\n*META:* ${meta}\n\n${parseInt(total) >= parseInt(meta) ? "✅ *META CONCLUÍDA*" : "❌ *PENDENTE*"}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
        }

        function limparTudo() {
            if(confirm("Limpar toda a produção de hoje?")) {
                localStorage.removeItem('borel_h_v8');
                localStorage.removeItem('borel_s_v8');
                localStorage.removeItem('borel_p_v8');
                location.reload();
            }
        }

        window.onload = () => {
            const log = localStorage.getItem('borel_sessao');
            if(log && (new Date().getTime() - log < 12*60*60*1000)) document.getElementById('tela-login').style.display = 'none';
            document.getElementById('somaDia').innerText = localStorage.getItem('borel_s_v8') || "0";
            document.getElementById('metaValor').value = localStorage.getItem('borel_m_v8') || "";
            document.getElementById('listaProducao').innerHTML = localStorage.getItem('borel_p_v8') || "";
            renderHistorico();
        };
    </script>
</body>
</html>
