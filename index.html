<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borel Tec - Central de Comando v9</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #ecf0f1; margin: 0; padding: 150px 15px 20px 15px; background: #0d1117; }
        
        /* TELA DE ACESSO */
        #tela-acesso { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .acesso-card { border-radius: 12px; border: 2px solid #30363d; text-align: center; width: 85%; max-width: 320px; padding: 30px 20px; background: url('./background.gif'); background-position: center; background-size: cover; border-top: 4px solid #39ff14; }
        .input-group { position: relative; width: 100%; margin: 10px 0; }
        .input-group input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: #00ff00; text-align: center; border-radius: 6px; box-sizing: border-box; font-weight: bold; }
        
        /* HEADER E NAV */
        .header-tools { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: #161b22; border-bottom: 1px solid #30363d; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        .nav-bar { position: fixed; top: 70px; left: 0; width: 100%; height: 50px; background: #0d1117; border-bottom: 1px solid #30363d; z-index: 999; display: flex; align-items: center; justify-content: space-around; padding: 0 10px; box-sizing: border-box; overflow-x: auto; }
        .btn-calc { background: #21262d; border: 2px solid #58a6ff; color: #58a6ff; padding: 8px 12px; border-radius: 8px; font-weight: bold; }
        
        /* CARDS E LISTAS */
        .total-box { background: #238636; color: white; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 1.3rem; margin-bottom: 20px; border: 1px solid #39ff14; }
        .card { background: rgba(22, 27, 34, 0.9); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d; }
        .item { background: #1c2128; border-left: 5px solid #58a6ff; padding: 15px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #30363d; }
        .item.pausado { border-left-color: #f1e05a; opacity: 0.8; }
        
        /* CALENDÁRIO */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .dia { background: #21262d; padding: 12px 0; text-align: center; border-radius: 4px; font-size: 0.8rem; border: 1px solid #30363d; color: #8b949e; }
        .dia-programado { background: #d97706 !important; color: white !important; }
        .dia-concluido { background: #059669 !important; color: white !important; }
        .hoje { border: 2px solid #58a6ff !important; color: white; }

        .btn-green { background: linear-gradient(180deg, #2ea44f 0%, #238636 100%); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; }
        .btn-mini { padding: 8px; font-size: 0.75rem; border-radius: 6px; border: none; font-weight: bold; color: white; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="tela-acesso">
        <div id="box-login" class="acesso-card">
            <h3 style="color: white;">Borel Tec LOGIN</h3>
            <div class="input-group"><input type="text" id="user-login" placeholder="USUÁRIO"></div>
            <div class="input-group"><input type="password" id="pass-login" placeholder="SENHA"></div>
            <button class="btn-green" onclick="fazerLogin()">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div class="header-tools">
        <button class="btn-calc" onclick="abrirCalc()">🧮 CALCULADORA</button>
        <div id="nome-logado" style="font-size: 0.8rem; color: #58a6ff; font-weight: bold;"></div>
    </div>

    <div class="nav-bar">
        <span class="nav-link" onclick="confirmarSair()" style="color:#f85149">SAIR</span>
    </div>

    <div class="total-box">PRODUÇÃO HOJE: <span id="somaDia">0</span></div>

    <div class="card">
        <div id="mesAno" style="font-weight:bold; color:#58a6ff; text-align:center; margin-bottom:10px"></div>
        <div class="cal-grid" id="calendario"></div>
    </div>

    <div class="card">
        <select id="modelo" style="width:100%; padding:10px; margin-bottom:10px; background:#0d1117; color:white; border-radius:6px;">
            <option value="MALTA">MALTA</option><option value="RAVEL">RAVEL</option>
            <option value="ARMANI">ARMANI</option><option value="IMOLA">IMOLA</option>
            <option value="SCOTT">SCOTT</option><option value="FLY">FLY</option>
        </select>
        <input type="number" id="quantidade" placeholder="Quantidade" style="width:100%; padding:10px; margin-bottom:10px; background:#0d1117; color:white; border-radius:6px; box-sizing:border-box;">
        <button class="btn-green" onclick="adicionarCarga()">INICIAR CARGA</button>
    </div>

    <div id="listaProducao"></div>

    <script>
        let logado = null;
        let cargasAtivas = [], memoriaCal = {}, agendaMetas = {};

        function fazerLogin() {
            const u = document.getElementById('user-login').value;
            if(u) {
                logado = { nome: u };
                document.getElementById('tela-acesso').style.display = 'none';
                document.getElementById('nome-logado').innerText = u;
                render();
            }
        }

        function adicionarCarga() {
            const mod = document.getElementById('modelo').value;
            const qtd = parseInt(document.getElementById('quantidade').value);
            if(qtd) {
                cargasAtivas.push({ id: Date.now(), mod, qtd, ini: new Date().toLocaleTimeString(), pausado: false });
                render();
            }
        }

        function concluir(id) {
            const c = cargasAtivas.find(x => x.id === id);
            const hoje = new Date().getDate();
            memoriaCal[hoje] = (memoriaCal[hoje] || 0) + c.qtd;
            cargasAtivas = cargasAtivas.filter(x => x.id !== id);
            render();
        }

        function alternarPausa(id) {
            const c = cargasAtivas.find(x => x.id === id);
            c.pausado = !c.pausado;
            render();
        }

        function render() {
            const lista = document.getElementById('listaProducao');
            lista.innerHTML = "";
            cargasAtivas.forEach(c => {
                lista.innerHTML += `
                    <div class="item ${c.pausado ? 'pausado' : ''}">
                        <strong>${c.mod}</strong>: ${c.qtd} un.<br>
                        <button class="btn-mini" style="background:#238636" onclick="concluir(${c.id})">OK</button>
                        <button class="btn-mini" style="background:#f1e05a; color:black" onclick="alternarPausa(${c.id})">⏸️</button>
                    </div>`;
            });
            const hoje = new Date().getDate();
            document.getElementById('somaDia').innerText = memoriaCal[hoje] || 0;
            renderCal();
        }

        function renderCal() {
            const cal = document.getElementById('calendario');
            cal.innerHTML = "";
            for(let i=1; i<=30; i++) {
                const div = document.createElement('div');
                div.className = `dia ${i === new Date().getDate() ? 'hoje' : ''}`;
                div.innerText = i;
                cal.appendChild(div);
            }
        }

        function confirmarSair() { location.reload(); }
    </script>
</body>
</html>
