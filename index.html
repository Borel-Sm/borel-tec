<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borel Tec - Sistema Oficial</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; color: #ecf0f1; margin: 0; padding: 110px 15px 20px 15px; background: #0d1117; }
        
        #tela-login { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: #0d1117;
            background-image: url('background.jpg'); 
            background-size: cover; background-position: center; 
            z-index: 9999; display: flex; align-items: center; justify-content: center; 
        }
        .login-card { border-radius: 12px; border: 2px solid #30363d; text-align: center; width: 85%; max-width: 320px; padding: 40px 20px; background: rgba(22, 27, 34, 0.9); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: #00ff00; text-align: center; border-radius: 6px; box-sizing: border-box; }
        
        .minha-logo { position: fixed; top: 15px; left: 15px; height: 50px; z-index: 1001; }
        .top-btns { position: fixed; top: 15px; right: 15px; display: flex; gap: 8px; z-index: 1000; }
        .btn-top { background: #21262d; color: #58a6ff; border: 1px solid #30363d; padding: 10px 15px; border-radius: 6px; font-weight: bold; }
        .total-box { background: #238636; color: white; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .card { background: rgba(22, 27, 34, 0.9); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d; }
        .item { background: rgba(48, 54, 61, 0.5); border-left: 4px solid #58a6ff; padding: 15px; margin-bottom: 12px; border-radius: 4px; }
        .item.pausado { border-left-color: #f1e05a; opacity: 0.5; }
        .btn-green { background: #238636; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-red { background: #da3633; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-mini { width: auto; padding: 8px 12px; font-size: 0.8rem; margin-top: 8px; margin-right: 5px; border-radius: 4px; border: none; font-weight: bold; }
        select, input[type="number"] { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .dia-semana { text-align: center; font-size: 0.7rem; color: #8b949e; font-weight: bold; padding-bottom: 5px; }
        .dia { background: #21262d; padding: 12px 0; text-align: center; border-radius: 4px; font-size: 0.85rem; border: 1px solid #30363d; cursor: pointer; position: relative; }
        .dia-vazio { opacity: 0; pointer-events: none; }
        .dia-ok { background: #238636 !important; border-color: #39ff14 !important; font-weight: bold; }
        .dia-meta { border-bottom: 3px solid #58a6ff !important; }
        .hoje { border: 2px solid #58a6ff !important; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-card">
            <h3 style="color: white; margin-top: 0;">ACESSO RESTRITO</h3>
            <input type="text" id="user" placeholder="USUÁRIO">
            <input type="password" id="pass" placeholder="SENHA">
            <button class="btn-green" onclick="autenticar()">ACESSAR</button>
        </div>
    </div>

    <img src="logo.png" class="minha-logo">
    <div class="top-btns">
        <button class="btn-top" onclick="toggleCalc()">🧮 CALC</button>
    </div>

    <div class="total-box">PRODUÇÃO HOJE: <span id="somaDia">0</span></div>

    <div class="card" style="margin-top:15px">
        <label>Meta do Dia:</label>
        <input type="number" id="metaValor" placeholder="Ex: 2300" onchange="salvar()">
    </div>

    <div class="card">
        <h3>Lançar Carga</h3>
        <select id="modelo">
            <option value="MALTA">MALTA</option><option value="RAVEL">RAVEL</option>
            <option value="ARMANI">ARMANI</option><option value="IMOLA">IMOLA</option>
            <option value="SCOTT">SCOTT</option><option value="FLY">FLY</option>
            <option value="MEGA">MEGA</option><option value="BELLA">BELLA</option>
            <option value="BOSS">BOSS</option><option value="FAZANO">FAZANO</option>
            <option value="TIVOLI">TIVOLI</option><option value="PARATY">PARATY</option>
        </select>
        <input type="number" id="quantidade" placeholder="Quantidade">
        <button class="btn-green" style="background:#1f6feb" onclick="adicionarManual()">INICIAR CARGA</button>
    </div>

    <div id="listaProducao"></div>

    <div class="card">
        <h3>Histórico Concluído</h3>
        <div id="listaHistorico" style="max-height: 200px; overflow-y: auto; margin-bottom: 10px;"></div>
        
        <button class="btn-green" style="background:#238636; border: 2px solid #39ff14;" onclick="finalizarRelatorio()">✅ FINALIZAR E ENVIAR RELATÓRIO</button>
        
        <button class="btn-red" onclick="limparHistorico()" style="background:#484f58">🗑️ APENAS LIMPAR LISTA</button>
    </div>

    <div class="card">
        <div class="cal-header">
            <button class="btn-mini" onclick="mudarMes(-1)" style="background:#30363d; color:white"><</button>
            <h3 id="mesAno" style="color:#58a6ff; margin:0; font-size:1rem"></h3>
            <button class="btn-mini" onclick="mudarMes(1)" style="background:#30363d; color:white">></button>
        </div>
        <div class="cal-grid" id="calendario"></div>
        <button class="btn-red" onclick="zerarCalendario()" style="background:#4a0000; margin-top: 15px;">ZERAR TUDO (CALENDÁRIO)</button>
    </div>

    <script>
        let historicoGeral = JSON.parse(localStorage.getItem('borel_h_v16')) || [];
        let cargasAtivas = JSON.parse(localStorage.getItem('borel_ativas_v16')) || [];
        let memoriaCal = JSON.parse(localStorage.getItem('borel_c_v16')) || {};
        let agendaMetas = JSON.parse(localStorage.getItem('borel_metas_agenda')) || {};
        let dataAtual = new Date();

        function autenticar() {
            if(document.getElementById('user').value === "BorelTec" && document.getElementById('pass').value === "Borel77") {
                localStorage.setItem('borel_sessao', new Date().getTime());
                document.getElementById('tela-login').style.display = 'none';
            }
        }

        function salvar() {
            localStorage.setItem('borel_h_v16', JSON.stringify(historicoGeral));
            localStorage.setItem('borel_s_v16', document.getElementById('somaDia').innerText);
            localStorage.setItem('borel_m_v16', document.getElementById('metaValor').value);
            localStorage.setItem('borel_ativas_v16', JSON.stringify(cargasAtivas));
            localStorage.setItem('borel_c_v16', JSON.stringify(memoriaCal));
            localStorage.setItem('borel_metas_agenda', JSON.stringify(agendaMetas));
        }

        function adicionarManual() {
            const q = parseInt(document.getElementById('quantidade').value);
            if(!q || q <= 0) return;
            const nova = { id: Date.now(), mod: document.getElementById('modelo').value, qtd: q, ini: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), pausado: false };
            cargasAtivas.push(nova);
            document.getElementById('quantidade').value = "";
            renderCargas(); salvar();
        }

        function renderCargas() {
            const lista = document.getElementById('listaProducao'); lista.innerHTML = "";
            cargasAtivas.forEach(c => {
                const div = document.createElement('div');
                div.className = `item ${c.pausado ? 'pausado' : ''}`;
                div.innerHTML = `<strong>${c.mod}</strong>: ${c.qtd} un. <br><small>⏰ Início: ${c.ini}</small><br>
                    <button class="btn-green btn-mini" onclick="concluir(${c.id})">CONCLUIR</button>
                    <button class="btn-mini" style="background:#f1e05a; color:black" onclick="pausar(${c.id})">${c.pausado ? 'RETOMAR' : 'PAUSAR'}</button>
                    <button class="btn-mini" style="background:#da3633; color:white" onclick="excluir(${c.id})">EXCLUIR</button>`;
                lista.appendChild(div);
            });
        }

        function pausar(id) {
            const c = cargasAtivas.find(x => x.id === id);
            c.pausado = !c.pausado;
            renderCargas(); salvar();
        }

        function concluir(id) {
            const c = cargasAtivas.find(x => x.id === id);
            const agora = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('somaDia').innerText = parseInt(document.getElementById('somaDia').innerText) + c.qtd;
            historicoGeral.push({ mod: c.mod, qtd: c.qtd, ini: c.ini, fim: agora });
            cargasAtivas = cargasAtivas.filter(x => x.id !== id);
            renderCargas(); renderHistorico(); salvar();
        }

        function finalizarRelatorio() {
            const total = document.getElementById('somaDia').innerText;
            if(parseInt(total) === 0) return alert("Sem produção para salvar.");
            
            // 1. Prepara Mensagem do WhatsApp
            const meta = document.getElementById('metaValor').value || 0;
            let msg = `*RELATÓRIO BOREL TEC*\n📅 ${new Date().toLocaleDateString()}\n---\n`;
            historicoGeral.forEach(i => msg += `• *${i.mod}*: ${i.qtd}un (${i.ini} - ${i.fim})\n`);
            msg += `---\n*TOTAL:* ${total} | *META:* ${meta}\n`;
            msg += parseInt(total) >= parseInt(meta) ? "✅ *META ATINGIDA!*" : "❌ *META PENDENTE*";

            // 2. Salva no Calendário
            const key = `${new Date().getFullYear()}-${new Date().getMonth()}-${new Date().getDate()}`;
            memoriaCal[key] = (memoriaCal[key] || 0) + parseInt(total);
            
            // 3. Limpa Tudo e Salva
            historicoGeral = []; 
            document.getElementById('somaDia').innerText = "0";
            renderHistorico(); renderCal(); salvar();

            // 4. Abre WhatsApp
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
        }

        function renderHistorico() {
            const lista = document.getElementById('listaHistorico'); lista.innerHTML = "";
            historicoGeral.slice().reverse().forEach(i => {
                lista.innerHTML += `<div style="border-bottom:1px solid #30363d; padding:8px; font-size:0.85rem">
                    <b>✅ ${i.mod}: ${i.qtd}un</b> <small style="color:#8b949e">(${i.ini} - ${i.fim})</small>
                </div>`;
            });
        }

        function mudarMes(direcao) {
            dataAtual.setMonth(dataAtual.getMonth() + direcao);
            renderCal();
        }

        function renderCal() {
            const cal = document.getElementById('calendario'); cal.innerHTML = "";
            const mes = dataAtual.getMonth();
            const ano = dataAtual.getFullYear();
            const meses = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
            document.getElementById('mesAno').innerText = `${meses[mes]} ${ano}`;
            const primeiroDia = new Date(ano, mes, 1).getDay();
            const diasNoMes = new Date(ano, mes + 1, 0).getDate();
            ["D","S","T","Q","Q","S","S"].forEach(d => cal.innerHTML += `<div class="dia-semana">${d}</div>`);
            for(let i = 0; i < primeiroDia; i++) cal.innerHTML += `<div class="dia dia-vazio"></div>`;
            for(let i = 1; i <= diasNoMes; i++) {
                const key = `${ano}-${mes}-${i}`;
                const div = document.createElement('div');
                div.className = 'dia';
                div.innerText = i;
                if(memoriaCal[key]) div.classList.add('dia-ok');
                if(agendaMetas[key]) div.classList.add('dia-meta');
                if(i === new Date().getDate() && mes === new Date().getMonth() && ano === new Date().getFullYear()) div.classList.add('hoje');
                div.onclick = () => {
                    const m = prompt(`DIA ${i} de ${meses[mes]}\nProdução: ${memoriaCal[key]||0}\nNova Meta:`, agendaMetas[key]||"");
                    if(m !== null) { m==="" ? delete agendaMetas[key] : agendaMetas[key]=parseInt(m); renderCal(); salvar(); }
                };
                cal.appendChild(div);
            }
        }

        function zerarCalendario() { if(confirm("Zerar TODA a memória do calendário?")) { memoriaCal={}; agendaMetas={}; salvar(); renderCal(); } }
        function limparHistorico() { if(confirm("Limpar lista de hoje sem salvar?")) { historicoGeral=[]; renderHistorico(); salvar(); } }
        function toggleCalc() { alert("Calculadora em manutenção."); }

        window.onload = () => {
            const sessao = localStorage.getItem('borel_sessao');
            if(sessao) document.getElementById('tela-login').style.display = 'none';
            document.getElementById('somaDia').innerText = localStorage.getItem('borel_s_v16') || "0";
            document.getElementById('metaValor').value = localStorage.getItem('borel_m_v16') || "";
            renderCargas(); renderHistorico(); renderCal();
        };
    </script>
</body>
</html>
