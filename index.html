<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borel Tec - Terminal Oficial</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; color: #ecf0f1; margin: 0; padding: 110px 15px 20px 15px; background: #0d1117; }
        
        /* Login */
        #tela-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { position: relative; border-radius: 12px; border: 2px solid #30363d; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden; }
        .login-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .login-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 30px; box-sizing: border-box; background: rgba(0,0,0,0.4); }
        .login-card h3 { color: #ffffff; margin-bottom: 25px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(1, 4, 9, 0.8); border: 1px solid #30363d; color: #00ff00; text-align: center; border-radius: 6px; outline: none; }

        /* Interface Principal */
        .minha-logo { position: fixed; top: 15px; left: 15px; height: 50px; z-index: 1001; }
        .total-box { background: #238636; color: white; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .meta-container { background: #161b22; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid #30363d; }
        .progress-bg { background: #30363d; height: 20px; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { background: #238636; height: 100%; width: 0%; transition: width 0.5s; }

        .card { background: rgba(22, 27, 34, 0.9); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d; }
        select, input[type="number"] { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }

        .item { background: rgba(48, 54, 61, 0.5); border-left: 4px solid #58a6ff; padding: 15px; margin-bottom: 12px; border-radius: 4px; }
        .btn-green { background: #238636; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-red { background: #da3633; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 10px; }

        /* Histórico */
        .historico-item { background: #0d1117; border: 1px solid #30363d; padding: 10px; margin-bottom: 5px; border-radius: 4px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-card">
            <img src="fundo.jpg">
            <div class="login-content">
                <h3>SISTEMA DE PRODUÇÃO</h3>
                <input type="text" id="user" placeholder="USUÁRIO">
                <input type="password" id="pass" placeholder="SENHA">
                <button class="btn-green" onclick="autenticar()">ACESSAR</button>
                <p id="erro" style="color: #f85149; display: none; margin-top: 15px;">Acesso Negado</p>
            </div>
        </div>
    </div>

    <img src="logo.png" class="minha-logo">

    <div class="total-box">HOJE: <span id="somaDia">0</span> CADEIRAS</div>

    <div class="meta-container">
        <label>Meta Hoje:</label>
        <input type="number" id="metaValor" placeholder="Ex: 2300" onchange="atualizarProgresso()">
        <div style="font-size: 0.9rem;">Progresso: <span id="progressoTexto">0%</span></div>
        <div class="progress-bg"><div id="barraFill" class="progress-fill"></div></div>
    </div>

    <div class="card">
        <h3>Lançar Carga</h3>
        <select id="modelo">
            <option value="ARMANI">ARMANI</option><option value="BELLA">BELLA</option>
            <option value="BOSS">BOSS</option><option value="FAZANO">FAZANO</option>
            <option value="FLY">FLY</option><option value="IMOLA">IMOLA</option>
            <option value="MALTA">MALTA</option><option value="MEGA">MEGA</option>
            <option value="PARATY">PARATY</option><option value="RAVEL">RAVEL</option>
            <option value="SCOTT">SCOTT</option><option value="TIVOLI">TIVOLI</option>
        </select>
        <input type="number" id="quantidade" placeholder="Qtd">
        <button class="btn-green" onclick="adicionarCarga()">INICIAR CARGA</button>
    </div>

    <div id="listaProducao"></div>

    <div class="card">
        <h3>Histórico do Dia</h3>
        <div id="listaHistorico" style="max-height: 250px; overflow-y: auto; margin-bottom: 10px;"></div>
        
        <button class="btn-green" onclick="enviarZap()">📤 ENVIAR RELATÓRIO WHATSAPP</button>
        <button class="btn-red" style="background:#484f58" onclick="limparSomenteHistorico()">LIMPAR APENAS HISTÓRICO</button>
        <button class="btn-red" onclick="zerarTudo()">REINICIAR TUDO (Sair)</button>
    </div>

    <script>
        // --- LÓGICA DE LOGIN (12 HORAS) ---
        function autenticar() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if(u === "BorelTec" && p === "Borel77") {
                const agora = new Date().getTime();
                localStorage.setItem('login_time', agora);
                document.getElementById('tela-login').style.display = 'none';
            } else {
                document.getElementById('erro').style.display = 'block';
            }
        }

        function verificarLogin() {
            const salvo = localStorage.getItem('login_time');
            if (salvo) {
                const agora = new Date().getTime();
                const dozeHoras = 12 * 60 * 60 * 1000;
                if (agora - salvo < dozeHoras) {
                    document.getElementById('tela-login').style.display = 'none';
                }
            }
        }

        // --- PRODUÇÃO ---
        let historicoDados = JSON.parse(localStorage.getItem('borel_h_dados')) || [];

        function salvar() {
            localStorage.setItem('s_borel', document.getElementById('somaDia').innerText);
            localStorage.setItem('m_borel', document.getElementById('metaValor').value);
            localStorage.setItem('borel_h_dados', JSON.stringify(historicoDados));
            localStorage.setItem('p_html', document.getElementById('listaProducao').innerHTML);
            atualizarProgresso();
        }

        function atualizarProgresso() {
            const total = parseInt(document.getElementById('somaDia').innerText);
            const meta = parseInt(document.getElementById('metaValor').value) || 0;
            const porc = meta > 0 ? Math.min((total / meta) * 100, 100).toFixed(1) : 0;
            document.getElementById('barraFill').style.width = porc + "%";
            document.getElementById('progressoTexto').innerText = porc + "%";
        }

        function adicionarCarga() {
            const m = document.getElementById('modelo').value;
            const q = document.getElementById('quantidade').value;
            if(!q || q <= 0) return;
            
            const ini = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<strong>${m}</strong>: ${q} un. (Início: ${ini})<br>
                <button class="btn-green" style="width:auto; margin-top:5px" onclick="concluirCarga(this, '${m}', ${q}, '${ini}')">CONCLUIR</button>`;
            document.getElementById('listaProducao').appendChild(div);
            document.getElementById('quantidade').value = "";
            salvar();
        }

        function concluirCarga(btn, mod, qtd, horaInicio) {
            const horaFim = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const totalAtual = parseInt(document.getElementById('somaDia').innerText);
            document.getElementById('somaDia').innerText = totalAtual + qtd;
            
            const dado = { modelo: mod, quantidade: qtd, inicio: horaInicio, fim: horaFim, data: new Date().toLocaleDateString() };
            historicoDados.push(dado);
            
            renderizarHistorico();
            btn.closest('.item').remove();
            salvar();
        }

        function renderizarHistorico() {
            const lista = document.getElementById('listaHistorico');
            lista.innerHTML = "";
            historicoDados.slice().reverse().forEach(item => {
                lista.innerHTML += `<div class="historico-item">
                    ✅ <strong>${item.modelo}</strong>: ${item.quantidade}un<br>
                    <small>🕒 ${item.inicio} às ${item.fim} | 📅 ${item.data}</small>
                </div>`;
            });
        }

        // --- WHATSAPP E LIMPEZA ---
        function enviarZap() {
            const total = document.getElementById('somaDia').innerText;
            const meta = document.getElementById('metaValor').value || 0;
            const dataHoje = new Date().toLocaleDateString();
            
            let statusMeta = parseInt(total) >= parseInt(meta) ? "✅ *META CONCLUÍDA*" : "❌ *META NÃO CONCLUÍDA*";
            
            let texto = `*RELATÓRIO DE PRODUÇÃO - BOREL TEC*\n`;
            texto += `📅 Data: ${dataHoje}\n`;
            texto += `--------------------------------\n`;
            
            historicoDados.forEach(item => {
                texto += `• ${item.modelo}: ${item.quantidade}un (${item.inicio} - ${item.fim})\n`;
            });
            
            texto += `--------------------------------\n`;
            texto += `*TOTAL PRODUZIDO:* ${total}\n`;
            texto += `*META DO DIA:* ${meta}\n`;
            texto += `\n${statusMeta}`;

            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(texto)}`);
        }

        function limparSomenteHistorico() {
            if(confirm("Deseja apagar o histórico e zerar a contagem de hoje?")) {
                historicoDados = [];
                document.getElementById('somaDia').innerText = "0";
                document.getElementById('listaHistorico').innerHTML = "";
                salvar();
                // Não damos reload para não sair do login
            }
        }

        function zerarTudo() {
            if(confirm("Isso apagará TUDO e exigirá novo login. Confirmar?")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = () => {
            verificarLogin();
            document.getElementById('somaDia').innerText = localStorage.getItem('s_borel') || "0";
            document.getElementById('metaValor').value = localStorage.getItem('m_borel') || "";
            document.getElementById('listaProducao').innerHTML = localStorage.getItem('p_html') || "";
            renderizarHistorico();
            atualizarProgresso();
        };
    </script>
</body>
</html>
