<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borel Tec - Sistema Profissional</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; color: #ecf0f1; margin: 0; padding: 110px 15px 20px 15px; background: #0d1117; }
        
        /* ACESSO */
        #tela-acesso { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117 url('background.jpg') center/cover; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .acesso-card { border-radius: 12px; border: 2px solid #30363d; text-align: center; width: 85%; max-width: 320px; padding: 30px 20px; background: rgba(22, 27, 34, 0.95); box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-top: 4px solid #39ff14; }
        .input-group { position: relative; width: 100%; margin: 10px 0; }
        .input-group input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: #00ff00; text-align: center; border-radius: 6px; box-sizing: border-box; font-weight: bold; }
        .toggle-pass { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #8b949e; }
        
        /* HEADER */
        .header-tools { position: fixed; top: 0; left: 0; width: 100%; height: 90px; background: #161b22; border-bottom: 1px solid #30363d; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        .btn-calc { background: #21262d; border: 2px solid #58a6ff; color: #58a6ff; padding: 10px 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .user-badge { text-align: right; }
        .btn-sair { background: #da3633; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-top: 5px; cursor: pointer; }

        /* GERAL */
        .total-box { background: #238636; color: white; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 1.3rem; margin-bottom: 20px; border: 1px solid #39ff14; box-shadow: 0 4px 15px rgba(35, 134, 54, 0.4); }
        .card { background: rgba(22, 27, 34, 0.9); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d; }
        
        /* BOTÕES ESTILIZADOS */
        .btn-green { background: linear-gradient(180deg, #2ea44f 0%, #238636 100%); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-mini { padding: 10px; font-size: 0.8rem; border-radius: 6px; border: none; font-weight: bold; color: white; cursor: pointer; transition: transform 0.1s; margin-right: 5px; margin-top: 8px; }
        .btn-mini:active { transform: scale(0.95); }
        
        /* ITENS DA LISTA */
        .item { background: #1c2128; border-left: 5px solid #58a6ff; padding: 15px; margin-bottom: 12px; border-radius: 6px; border-top: 1px solid #30363d; border-right: 1px solid #30363d; border-bottom: 1px solid #30363d; }
        .item.pausado { border-left-color: #f1e05a; background: #161b22; opacity: 0.8; }
        
        /* CALENDÁRIO */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .dia { background: #21262d; padding: 12px 0; text-align: center; border-radius: 4px; font-size: 0.8rem; border: 1px solid #30363d; color: #8b949e; }
        .dia-ok { background: #238636 !important; color: white !important; border-color: #39ff14 !important; font-weight: bold; }
        .hoje { border: 2px solid #58a6ff !important; color: white; }

        select, input[type="number"] { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="tela-acesso">
        <div id="box-login" class="acesso-card">
            <h3 style="color: white;">Borel Tec Login</h3>
            <div class="input-group"><input type="text" id="user-login" placeholder="USUÁRIO"></div>
            <div class="input-group">
                <input type="password" id="pass-login" placeholder="SENHA">
                <span class="toggle-pass" onclick="verSenha('pass-login')">👁️</span>
            </div>
            <button class="btn-green" onclick="fazerLogin()">ENTRAR NO SISTEMA</button>
            <p style="font-size: 0.8rem; margin-top: 15px; color: #8b949e;">Novo aqui? <a href="#" onclick="trocarTela('box-reg')" style="color:#58a6ff">Criar Conta</a></p>
        </div>

        <div id="box-reg" class="acesso-card" style="display:none">
            <h3 style="color: white;">Novo Registro</h3>
            <div class="input-group"><input type="text" id="reg-nome" placeholder="NOME"></div>
            <div class="input-group"><input type="text" id="reg-user" placeholder="USUÁRIO"></div>
            <div class="input-group">
                <input type="password" id="reg-pass" placeholder="SENHA">
                <span class="toggle-pass" onclick="verSenha('reg-pass')">👁️</span>
            </div>
            <div class="input-group">
                <input type="password" id="reg-pass2" placeholder="CONFIRME A SENHA">
                <span class="toggle-pass" onclick="verSenha('reg-pass2')">👁️</span>
            </div>
            <button class="btn-green" style="background:#1f6feb" onclick="registrarUsuario()">CRIAR AGORA</button>
            <p onclick="trocarTela('box-login')" style="cursor:pointer; font-size:0.8rem; color:#8b949e; margin-top:10px">Voltar</p>
        </div>
    </div>

    <div class="header-tools">
        <button class="btn-calc" onclick="abrirCalc()">🧮 CALCULADORA</button>
        <div class="user-badge">
            <div style="font-size: 0.8rem; color: #58a6ff; font-weight: bold;" id="nome-logado"></div>
            <button class="btn-sair" onclick="fazerLogout()">SAIR</button>
        </div>
    </div>

    <div class="total-box">PRODUÇÃO HOJE: <span id="somaDia">0</span></div>

    <div class="card">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:10px">
            <button class="btn-mini" onclick="mudarMes(-1)" style="background:#30363d"><</button>
            <span id="mesAno" style="font-weight:bold; color:#58a6ff"></span>
            <button class="btn-mini" onclick="mudarMes(1)" style="background:#30363d">></button>
        </div>
        <div class="cal-grid" id="calendario"></div>
        <button class="btn-mini" onclick="zerarCalendario()" style="background:#4a0000; width:100%; margin-top:10px; font-size:0.7rem">🗑️ ZERAR TUDO DO CALENDÁRIO</button>
    </div>

    <div class="card">
        <h3 style="margin-top:0">Lançar Nova Carga</h3>
        <select id="modelo">
            <option value="MALTA">MALTA</option><option value="RAVEL">RAVEL</option>
            <option value="ARMANI">ARMANI</option><option value="IMOLA">IMOLA</option>
            <option value="SCOTT">SCOTT</option><option value="FLY">FLY</option>
            <option value="MEGA">MEGA</option><option value="BELLA">BELLA</option>
            <option value="BOSS">BOSS</option><option value="FAZANO">FAZANO</option>
            <option value="TIVOLI">TIVOLI</option><option value="PARATY">PARATY</option>
        </select>
        <input type="number" id="quantidade" placeholder="Quantidade de espumas">
        <button class="btn-green" onclick="adicionarCarga()">INICIAR PRODUÇÃO</button>
    </div>

    <div id="listaProducao"></div>

    <div class="card">
        <h3>Histórico da Sessão</h3>
        <div id="listaHistorico" style="max-height: 150px; overflow-y: auto; background:#0d1117; padding:10px; border-radius:6px"></div>
        <button class="btn-green" style="margin-top:15px; border: 2px solid #39ff14;" onclick="finalizarRelatorio()">✅ FINALIZAR E ENVIAR RELATÓRIO</button>
        <button class="btn-mini" onclick="limparHistoricoSessao()" style="background:#30363d; width:100%; margin-top:10px">Limpar Lista</button>
    </div>

    <script>
        let usuarios = JSON.parse(localStorage.getItem('bt_u_v2')) || [];
        let logado = JSON.parse(localStorage.getItem('bt_l_v2')) || null;
        let historicoSessao = [];
        let cargasAtivas = JSON.parse(localStorage.getItem('bt_at_v2')) || [];
        let memoriaCal = JSON.parse(localStorage.getItem('bt_c_v2')) || {};
        let agendaMetas = JSON.parse(localStorage.getItem('bt_m_v2')) || {};
        let dataAtual = new Date();

        // ACESSO
        function verSenha(id) { const i = document.getElementById(id); i.type = i.type === "password" ? "text" : "password"; }
        function trocarTela(id) { document.getElementById('box-login').style.display = 'none'; document.getElementById('box-reg').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
        
        function registrarUsuario() {
            const n = document.getElementById('reg-nome').value, u = document.getElementById('reg-user').value, p1 = document.getElementById('reg-pass').value, p2 = document.getElementById('reg-pass2').value;
            if(!n || !u || !p1) return alert("Preencha tudo!");
            if(p1 !== p2) return alert("Senhas diferentes!");
            usuarios.push({nome: n, user: u, pass: p1});
            localStorage.setItem('bt_u_v2', JSON.stringify(usuarios));
            alert("Sucesso! Faça login."); trocarTela('box-login');
        }

        function fazerLogin() {
            const u = document.getElementById('user-login').value, p = document.getElementById('pass-login').value;
            const conta = usuarios.find(x => x.user === u && x.pass === p);
            if(conta) { 
                logado = conta; localStorage.setItem('bt_logado_v2', JSON.stringify(logado)); 
                document.getElementById('tela-acesso').style.display = 'none';
                document.getElementById('nome-logado').innerText = logado.nome;
            } else alert("Erro!");
        }

        function fazerLogout() { localStorage.removeItem('bt_logado_v2'); location.reload(); }

        // PRODUÇÃO
        function adicionarCarga() {
            const q = parseInt(document.getElementById('quantidade').value);
            if(!q) return;
            cargasAtivas.push({ id: Date.now(), mod: document.getElementById('modelo').value, qtd: q, ini: agora(), pausado: false });
            document.getElementById('quantidade').value = "";
            render();
        }

        function editarCarga(id) {
            const c = cargasAtivas.find(x => x.id === id);
            const restante = parseInt(prompt(`DIGITE O VALOR RESTANTE DE ESPUMAS PARA ${c.mod}:`));
            
            if(!isNaN(restante) && restante >= 0 && restante < c.qtd) {
                const feito = c.qtd - restante;
                // O que foi feito vai para o histórico
                historicoSessao.push({ mod: c.mod, qtd: feito, ini: c.ini, fim: agora() });
                // O restante fica pausado na lista
                c.qtd = restante;
                c.pausado = true;
                alert(`Sucesso! ${feito} un. foram para o histórico. ${restante} un. restantes ficaram pausadas.`);
                render();
            } else {
                alert("Valor inválido ou maior que a carga original.");
            }
        }

        function concluir(id) {
            const c = cargasAtivas.find(x => x.id === id);
            historicoSessao.push({ mod: c.mod, qtd: c.qtd, ini: c.ini, fim: agora() });
            cargasAtivas = cargasAtivas.filter(x => x.id !== id);
            render();
        }

        function finalizarRelatorio() {
            const k = `${dataAtual.getFullYear()}-${dataAtual.getMonth()}-${dataAtual.getDate()}`;
            let somaSessao = 0;
            historicoSessao.forEach(i => somaSessao += i.qtd);
            
            memoriaCal[k] = (memoriaCal[k] || 0) + somaSessao;
            document.getElementById('somaDia').innerText = memoriaCal[k];
            
            let msg = `*RELATÓRIO BOREL TEC*\n👤 Op: ${logado.nome}\n📅 ${new Date().toLocaleDateString()}\n---\n`;
            msg += `📊 NO CALENDÁRIO: ${memoriaCal[k]} un.\n🎯 META: ${agendaMetas[k] || 0}\n`;
            
            historicoSessao = []; 
            render(); renderCal();
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
        }

        // AUXILIARES
        function agora() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
        function pausar(id) { const c = cargasAtivas.find(x => x.id === id); c.pausado = !c.pausado; render(); }
        function excluir(id) { if(confirm("Excluir?")) { cargasAtivas = cargasAtivas.filter(x => x.id !== id); render(); } }
        function limparHistoricoSessao() { historicoSessao = []; render(); }
        function zerarCalendario() { if(confirm("Apagar tudo do calendário?")) { memoriaCal = {}; agendaMetas = {}; renderCal(); } }
        function abrirCalc() { alert("Calculadora: Use a do sistema enquanto a embutida atualiza!"); }

        function render() {
            localStorage.setItem('bt_at_v2', JSON.stringify(cargasAtivas));
            localStorage.setItem('bt_c_v2', JSON.stringify(memoriaCal));
            localStorage.setItem('bt_m_v2', JSON.stringify(agendaMetas));

            const lista = document.getElementById('listaProducao'); lista.innerHTML = "";
            cargasAtivas.forEach(c => {
                const div = document.createElement('div');
                div.className = `item ${c.pausado ? 'pausado' : ''}`;
                div.innerHTML = `<strong>${c.mod}</strong>: <span style="color:#00ff00">${c.qtd} un.</span> <br><small>⏰ Início: ${c.ini}</small><br>
                    <button class="btn-mini" style="background:#238636" onclick="concluir(${c.id})">CONCLUIR OK</button>
                    <button class="btn-mini" style="background:#f1e05a; color:black" onclick="pausar(${c.id})">${c.pausado?'RETOMAR':'PAUSAR'}</button>
                    <button class="btn-mini" style="background:#58a6ff" onclick="editarCarga(${c.id})">✏️ EDITAR</button>
                    <button class="btn-mini" style="background:#da3633" onclick="excluir(${c.id})">🗑️ EXCLUIR</button>`;
                lista.appendChild(div);
            });

            const h = document.getElementById('listaHistorico'); h.innerHTML = "";
            historicoSessao.slice().reverse().forEach(i => {
                h.innerHTML += `<div style="font-size:0.8rem; border-bottom:1px solid #30363d; padding:5px">✅ <b>${i.mod}</b>: ${i.qtd}un</div>`;
            });
        }

        function mudarMes(d) { dataAtual.setMonth(dataAtual.getMonth() + d); renderCal(); }

        function renderCal() {
            const cal = document.getElementById('calendario'); cal.innerHTML = "";
            const mes = dataAtual.getMonth(), ano = dataAtual.getFullYear();
            const meses = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
            document.getElementById('mesAno').innerText = `${meses[mes]} ${ano}`;
            const diasNoMes = new Date(ano, mes + 1, 0).getDate();
            for(let i = 1; i <= diasNoMes; i++) {
                const k = `${ano}-${mes}-${i}`;
                const div = document.createElement('div');
                div.className = `dia ${memoriaCal[k]?'dia-ok':''} ${i===new Date().getDate() && mes===new Date().getMonth()?'hoje':''}`;
                div.innerText = i;
                div.onclick = () => {
                    const m = prompt(`Meta para o dia ${i}:`, agendaMetas[k] || "");
                    if(m !== null) { agendaMetas[k] = parseInt(m); renderCal(); }
                };
                cal.appendChild(div);
            }
        }

        window.onload = () => {
            const salvo = localStorage.getItem('bt_logado_v2');
            if(salvo) {
                logado = JSON.parse(salvo);
                document.getElementById('tela-acesso').style.display = 'none';
                document.getElementById('nome-logado').innerText = logado.nome;
            }
            const k = `${new Date().getFullYear()}-${new Date().getMonth()}-${new Date().getDate()}`;
            document.getElementById('somaDia').innerText = memoriaCal[k] || "0";
            render(); renderCal();
        };
    </script>
</body>
</html>
