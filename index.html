<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borel Tec - Terminal Oficial</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; color: #ecf0f1; margin: 0; padding: 110px 15px 20px 15px; background: #0d1117; }
        
        /* Login */
        #tela-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { position: relative; border-radius: 12px; border: 2px solid #30363d; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden; }
        .login-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .login-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 30px; box-sizing: border-box; background: rgba(0,0,0,0.4); }
        .login-card h3 { color: #ffffff; margin-bottom: 25px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(1, 4, 9, 0.8); border: 1px solid #30363d; color: #00ff00; text-align: center; border-radius: 6px; outline: none; }

        /* Interface Principal */
        .minha-logo { position: fixed; top: 15px; left: 15px; height: 50px; z-index: 1001; }
        .top-btns { position: fixed; top: 15px; right: 15px; display: flex; gap: 8px; z-index: 1000; }
        .btn-top { background: #21262d; color: #58a6ff; border: 1px solid #30363d; padding: 10px 15px; border-radius: 6px; font-weight: bold; }

        .total-box { background: #238636; color: white; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .meta-container { background: #161b22; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid #30363d; }
        .progress-bg { background: #30363d; height: 20px; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { background: #238636; height: 100%; width: 0%; transition: width 0.5s; }

        .card { background: rgba(22, 27, 34, 0.9); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d; }
        select, input[type="number"] { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }

        .btn-green { background: #238636; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-red { background: #da3633; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 10px; }

        /* CALENDÁRIO */
        .calendario-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .dia-celula { background: #21262d; padding: 10px 2px; text-align: center; border-radius: 4px; font-size: 0.8rem; border: 1px solid #30363d; position: relative; }
        .dia-com-producao { background: #238636 !important; border-color: #39ff14; cursor: pointer; }
        .mes-titulo { text-align: center; margin-bottom: 10px; color: #58a6ff; font-weight: bold; text-transform: uppercase; }
        .detalhe-dia { background: #1c2128; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #58a6ff; display: none; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-card">
            <img src="fundo.jpg">
            <div class="login-content">
                <h3>SISTEMA DE PRODUÇÃO</h3>
                <input type="text" id="user" placeholder="USUÁRIO">
                <input type="password" id="pass" placeholder="SENHA">
                <button class="btn-green" onclick="autenticar()">ACESSAR</button>
                <p id="erro" style="color: #f85149; display: none; margin-top: 15px;">Acesso Negado</p>
            </div>
        </div>
    </div>

    <img src="logo.png" class="minha-logo">
    <div class="top-btns">
        <button class="btn-top" onclick="alert('Histórico no final da página')">📅 DATA</button>
    </div>

    <div class="total-box">HOJE: <span id="somaDia">0</span> CADEIRAS</div>

    <div class="meta-container">
        <label>Meta Hoje:</label>
        <input type="number" id="metaValor" placeholder="Ex: 1900" onchange="atualizarProgresso()">
        <div style="font-size: 0.9rem;">Progresso Meta: <span id="progressoTexto">0%</span></div>
        <div class="progress-bg"><div id="barraFill" class="progress-fill"></div></div>
    </div>

    <div class="card">
        <h3>Lançar Carga</h3>
        <select id="modelo">
            <option value="ARMANI">ARMANI</option><option value="BELLA">BELLA</option>
            <option value="BOSS">BOSS</option><option value="FAZANO">FAZANO</option>
            <option value="FLY">FLY</option><option value="IMOLA">IMOLA</option>
            <option value="MALTA">MALTA</option><option value="MEGA">MEGA</option>
            <option value="PARATY">PARATY</option><option value="RAVEL">RAVEL</option>
            <option value="SCOTT">SCOTT</option><option value="TIVOLI">TIVOLI</option>
        </select>
        <input type="number" id="quantidade" placeholder="Qtd">
        <button class="btn-green" onclick="adicionarCarga()">CONCLUIR AGORA</button>
    </div>

    <div class="card">
        <h3 style="color:#58a6ff">📅 MEMÓRIA DE PRODUÇÃO</h3>
        <div id="mesAtual" class="mes-titulo"></div>
        <div class="calendario-grid" id="calendario"></div>
        
        <div id="detalheDia" class="detalhe-dia">
            <strong id="detData"></strong><br>
            Produção: <span id="detProd"></span> un.<br>
            Meta: <span id="detMeta"></span> un.
        </div>
        
        <button class="btn-green" style="background:#8957e5; margin-top:20px;" onclick="salvarDia()">FECHAR E MEMORIZAR DIA</button>
        <button class="btn-red" onclick="zerarTudo()">LIMPAR TUDO</button>
    </div>

    <script>
        function autenticar() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if(u === "BorelTec" && p === "Borel77") document.getElementById('tela-login').style.display = 'none';
            else document.getElementById('erro').style.display = 'block';
        }

        let memoria = JSON.parse(localStorage.getItem('borel_memoria')) || {};

        function atualizarProgresso() {
            const total = parseInt(document.getElementById('somaDia').innerText);
            const meta = parseInt(document.getElementById('metaValor').value) || 0;
            const porc = meta > 0 ? Math.min((total / meta) * 100, 100).toFixed(1) : 0;
            document.getElementById('barraFill').style.width = porc + "%";
            document.getElementById('progressoTexto').innerText = porc + "%";
            localStorage.setItem('s_borel', total);
            localStorage.setItem('m_borel', meta);
        }

        function adicionarCarga() {
            const q = parseInt(document.getElementById('quantidade').value);
            if(!q || q <= 0) return;
            const s = parseInt(document.getElementById('somaDia').innerText);
            document.getElementById('somaDia').innerText = s + q;
            document.getElementById('quantidade').value = "";
            atualizarProgresso();
        }

        function salvarDia() {
            const hoje = new Date();
            const dataChave = `${hoje.getFullYear()}-${hoje.getMonth()}-${hoje.getDate()}`;
            const total = document.getElementById('somaDia').innerText;
            const meta = document.getElementById('metaValor').value || "0";

            if(confirm(`Memorizar dia ${hoje.toLocaleDateString()} com ${total} peças?`)) {
                memoria[dataChave] = { prod: total, meta: meta };
                localStorage.setItem('borel_memoria', JSON.stringify(memoria));
                document.getElementById('somaDia').innerText = "0";
                atualizarProgresso();
                renderizarCalendario();
            }
        }

        function renderizarCalendario() {
            const agora = new Date();
            const mes = agora.getMonth();
            const ano = agora.getFullYear();
            const nomesMeses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
            
            document.getElementById('mesAtual').innerText = nomesMeses[mes] + " " + ano;
            const listaDias = new Date(ano, mes + 1, 0).getDate();
            const cal = document.getElementById('calendario');
            cal.innerHTML = "";

            for (let i = 1; i <= listaDias; i++) {
                const chave = `${ano}-${mes}-${i}`;
                const div = document.createElement('div');
                div.className = 'dia-celula';
                div.innerText = i;
                
                if(memoria[chave]) {
                    div.classList.add('dia-com-producao');
                    div.onclick = () => {
                        document.getElementById('detalheDia').style.display = 'block';
                        document.getElementById('detData').innerText = `${i}/${mes+1}/${ano}`;
                        document.getElementById('detProd').innerText = memoria[chave].prod;
                        document.getElementById('detMeta').innerText = memoria[chave].meta;
                    };
                }
                cal.appendChild(div);
            }
        }

        function zerarTudo() { if(confirm("Apagar todos os dados salvos?")) { localStorage.clear(); location.reload(); } }

        window.onload = () => {
            document.getElementById('somaDia').innerText = localStorage.getItem('s_borel') || "0";
            document.getElementById('metaValor').value = localStorage.getItem('m_borel') || "";
            atualizarProgresso();
            renderizarCalendario();
        };
    </script>
</body>
</html>
