<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borel Tec - Terminal Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; color: #ecf0f1; margin: 0; padding: 110px 15px 20px 15px; background: #0d1117; }
        
        /* Login */
        #tela-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { position: relative; border-radius: 12px; border: 2px solid #30363d; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden; }
        .login-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .login-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 30px; box-sizing: border-box; background: rgba(0,0,0,0.4); }
        .login-card h3 { color: #ffffff; margin-bottom: 25px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(1, 4, 9, 0.8); border: 1px solid #30363d; color: #00ff00; text-align: center; border-radius: 6px; outline: none; }

        /* Interface Principal */
        .minha-logo { position: fixed; top: 15px; left: 15px; height: 50px; z-index: 1001; }
        .top-btns { position: fixed; top: 15px; right: 15px; display: flex; gap: 8px; z-index: 1000; }
        .btn-top { background: #21262d; color: #58a6ff; border: 1px solid #30363d; padding: 10px 15px; border-radius: 6px; font-weight: bold; }

        .total-box { background: #238636; color: white; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* Barra de Meta */
        .meta-container { background: #161b22; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid #30363d; }
        .progress-bg { background: #30363d; height: 20px; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { background: #238636; height: 100%; width: 0%; transition: width 0.5s; }

        .card { background: rgba(22, 27, 34, 0.9); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d; }
        select, input[type="number"] { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }

        .item { background: rgba(48, 54, 61, 0.5); border-left: 4px solid #58a6ff; padding: 15px; margin-bottom: 12px; border-radius: 4px; }
        .btn-green { background: #238636; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-red { background: #da3633; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 10px; }

        /* Estilo do Calendário/Histórico */
        .historico-dia { background: #0d1117; border: 1px solid #30363d; padding: 10px; margin-top: 5px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-card">
            <img src="fundo.jpg">
            <div class="login-content">
                <h3>SISTEMA DE PRODUÇÃO</h3>
                <input type="text" id="user" placeholder="USUÁRIO">
                <input type="password" id="pass" placeholder="SENHA">
                <button class="btn-green" onclick="autenticar()">ACESSAR</button>
                <p id="erro" style="color: #f85149; display: none; margin-top: 15px;">Acesso Negado</p>
            </div>
        </div>
    </div>

    <img src="logo.png" class="minha-logo">
    <div class="top-btns">
        <button class="btn-top" onclick="document.getElementById('camera-input').click()">📷 SCAN</button>
        <button class="btn-top" onclick="alert('Histórico salvo no final da página!')">📅 DATA</button>
    </div>

    <input type="file" id="camera-input" accept="image/*" capture="camera" style="display:none" onchange="processarImagem(event)">

    <div class="total-box">PRODUÇÃO: <span id="somaDia">0</span> CADEIRAS</div>

    <div class="meta-container">
        <label>Meta do Dia:</label>
        <input type="number" id="metaValor" placeholder="Ex: 1900" onchange="atualizarMeta()" style="margin-bottom: 5px;">
        <div style="font-size: 0.9rem;">Progresso: <span id="progressoTexto">0%</span></div>
        <div class="progress-bg"><div id="barraFill" class="progress-fill"></div></div>
    </div>

    <div class="card">
        <h3>Lançar Modelo</h3>
        <select id="modelo">
            <option value="ARMANI">ARMANI</option><option value="BELLA">BELLA</option>
            <option value="BOSS">BOSS</option><option value="FAZANO">FAZANO</option>
            <option value="FLY">FLY</option><option value="IMOLA">IMOLA</option>
            <option value="MALTA">MALTA</option><option value="MEGA">MEGA</option>
            <option value="PARATY">PARATY</option><option value="RAVEL">RAVEL</option>
            <option value="SCOTT">SCOTT</option><option value="TIVOLI">TIVOLI</option>
        </select>
        <input type="number" id="quantidade" placeholder="Quantidade">
        <button class="btn-green" style="background:#1f6feb" onclick="adicionarCarga()">INICIAR CARGA</button>
    </div>

    <div id="listaProducao"></div>
    <div id="listaPendentes"></div>

    <div class="card">
        <h3>Relatório e Memória</h3>
        <div id="listaHistorico" style="max-height: 200px; overflow-y: auto;"></div>
        <button class="btn-green" style="margin-top:15px;" onclick="enviarZap()">ENVIAR WHATSAPP</button>
        <button class="btn-green" style="background:#8957e5; margin-top:10px;" onclick="fecharDia()">FECHAR DIA E SALVAR NO CALENDÁRIO</button>
        
        <h4 style="margin-top:20px; color:#58a6ff">📅 Arquivo de Produção (Memória)</h4>
        <div id="arquivoDias"></div>
        <button class="btn-red" onclick="zerarTudo()">REINICIAR TUDO</button>
    </div>

    <script>
        function autenticar() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if(u === "BorelTec" && p === "Borel77") document.getElementById('tela-login').style.display = 'none';
            else document.getElementById('erro').style.display = 'block';
        }

        const salvar = () => {
            localStorage.setItem('p', document.getElementById('listaProducao').innerHTML);
            localStorage.setItem('s', document.getElementById('somaDia').innerText);
            localStorage.setItem('h', document.getElementById('listaHistorico').innerHTML);
            localStorage.setItem('m', document.getElementById('metaValor').value);
            localStorage.setItem('a', document.getElementById('arquivoDias').innerHTML);
            atualizarProgresso();
        };

        function atualizarMeta() { salvar(); }

        function atualizarProgresso() {
            const total = parseInt(document.getElementById('somaDia').innerText);
            const meta = parseInt(document.getElementById('metaValor').value) || 0;
            if (meta > 0) {
                const porc = Math.min((total / meta) * 100, 100).toFixed(1);
                document.getElementById('barraFill').style.width = porc + "%";
                document.getElementById('progressoTexto').innerText = porc + "%";
            }
        }

        function adicionarCarga() {
            const m = document.getElementById('modelo').value;
            const q = document.getElementById('quantidade').value;
            if(!q || q <= 0) return;
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<strong>${m}</strong>: ${q} un.<br>
                <button class="btn-green" style="width:auto; margin-top:10px" onclick="concluir(this, '${m}', ${q})">CONCLUIR</button>`;
            document.getElementById('listaProducao').appendChild(div);
            document.getElementById('quantidade').value = ""; salvar();
        }

        function concluir(btn, mod, qtd) {
            const s = parseInt(document.getElementById('somaDia').innerText);
            document.getElementById('somaDia').innerText = s + qtd;
            const h = document.getElementById('listaHistorico');
            const agora = new Date().toLocaleTimeString();
            h.innerHTML = `<div class="historico-dia">✅ ${mod} (${qtd}un) - ${agora}</div>` + h.innerHTML;
            btn.closest('.item').remove(); salvar();
        }

        function fecharDia() {
            const data = new Date().toLocaleDateString();
            const total = document.getElementById('somaDia').innerText;
            const meta = document.getElementById('metaValor').value || "Não definida";
            if(confirm(`Deseja salvar o dia ${data} com ${total} peças?`)) {
                const registro = `<div class="historico-dia" style="border-left:4px solid #8957e5"><strong>${data}</strong> | Produção: ${total} | Meta: ${meta}</div>`;
                document.getElementById('arquivoDias').innerHTML = registro + document.getElementById('arquivoDias').innerHTML;
                document.getElementById('somaDia').innerText = "0";
                document.getElementById('listaHistorico').innerHTML = "";
                salvar();
            }
        }

        function zerarTudo() { if(confirm("Isso apagará TODO o histórico e arquivo. Confirmar?")) { localStorage.clear(); location.reload(); } }

        window.onload = () => {
            if(localStorage.getItem('p')) document.getElementById('listaProducao').innerHTML = localStorage.getItem('p');
            if(localStorage.getItem('s')) document.getElementById('somaDia').innerText = localStorage.getItem('s');
            if(localStorage.getItem('h')) document.getElementById('listaHistorico').innerHTML = localStorage.getItem('h');
            if(localStorage.getItem('m')) document.getElementById('metaValor').value = localStorage.getItem('m');
            if(localStorage.getItem('a')) document.getElementById('arquivoDias').innerHTML = localStorage.getItem('a');
            atualizarProgresso();
        };
    </script>
</body>
</html>
